<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Alerta Farmacéutica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar-sidebar.css}">
</head>

<body class="d-flex vh-100 overflow-hidden">
    <!-- Overlay para móvil -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="col py-4 px-4 flex-grow-1 vh-100 overflow-auto bg-light">
        <div class="topbar d-flex justify-content-between align-items-center">
            <h1>Alerta de productos</h1>

            <!-- TOPBAR -->
            <div th:replace="~{fragments/topbar :: logo}"></div>
        </div>

        <div class="inventory-container mt-4">

            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card bg-danger text-white text-center p-3 shadow-sm border-0">
                        <h6>Vencidos</h6>
                        <h3 th:text="${vencidosCount}">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-warning text-dark text-center p-3 shadow-sm border-0">
                        <h6>Por vencer</h6>
                        <h3 th:text="${porVencerCount}">0</h3>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-success text-white text-center p-3 shadow-sm border-0">
                        <h6>Vigentes</h6>
                        <h3 th:text="${vigentesCount}">0</h3>
                    </div>
                </div>
            </div>

            <div class="card p-3 mb-4 shadow-sm border-0">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto...">
                    </div>
                    <div class="col-md-4">
                        <select id="filtroEstado" class="form-select">
                            <option value="">Todos los estados</option>
                            <option value="Vencido">Vencido</option>
                            <option value="Por vencer">Por vencer</option>
                            <option value="Vigente">Vigente</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select id="filtroCategoria" class="form-select">
                            <option value="">Todas las categorías</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.nombreCategoria}"
                                th:text="${cat.nombreCategoria}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="table-responsive shadow-sm rounded bg-white p-3">
                <table id="tablaProductos" class="table table-hover align-middle" data-paginable data-filas="10">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Lote</th>
                            <th>Fecha venc.</th>
                            <th>Estado</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="producto : ${productos}"
                            th:data-categoria="${producto.categoria != null ? producto.categoria.nombreCategoria : 'Sin categoria'}"
                            th:data-estado="${producto.getDiasParaVencer() <= 0 ? 'Vencido' : (producto.getDiasParaVencer() <= 30 ? 'Por vencer' : 'Vigente')}">

                            <td th:text="${producto.nombreProducto}"></td>
                            <td th:text="${producto.lote}"></td>
                            <td th:text="${producto.fechaVencimiento}"></td>
                            <td class="estado-celda">
                                <span th:if="${producto.getDiasParaVencer() <= 0}"
                                    class="badge bg-danger">Vencido</span>
                                <span th:if="${producto.getDiasParaVencer() > 0 && producto.getDiasParaVencer() <= 30}"
                                    class="badge bg-warning text-dark">Por vencer</span>
                                <span th:if="${producto.getDiasParaVencer() > 30}"
                                    class="badge bg-success">Vigente</span>
                            </td>
                            <td th:text="${producto.cantidad}"></td>
                        </tr>
                    </tbody>
                </table>
                <!-- PAGINACIÓN (fragmento) -->
                <div th:replace="~{fragments/paginacion :: paginacion}"></div>
            </div>
        </div>
    </main>

    <script th:src="@{/js/jsAlertaProducto.js}"></script>
    <script th:src="@{/js/paginacionGlobal.js}"></script>
    <script th:src="@{/js/sidebar.js}"></script>
    <script>
        // Lógica simple para el filtro de estado combinado
        document.getElementById('filtroEstado').addEventListener('change', function () {
            const estado = this.value;
            const filas = document.querySelectorAll('#tablaProductos tbody tr');
            filas.forEach(fila => {
                const dataEstado = fila.getAttribute('data-estado');
                if (estado === "" || dataEstado === estado) {
                    fila.style.display = "";
                } else {
                    fila.style.display = "none";
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
