<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Alerta Farmacéutica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cssAlertaProducto.css}">

</head>

<body class="d-flex vh-100 overflow-hidden">

    <nav class="sidebar">
        <div class="sidebar-logo">IntiPharma<br>S.A.C.</div>
        <div class="sidebar-nav">
            <a class="nav-item" th:href="@{/alertaProducto}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.25C17.25 21.15 21 16.25 21 11V5L12 1zm0 2.18l7 3.12V11c0 4.1-2.93 7.93-7 9.07C7.93 18.93 5 15.1 5 11V6.3l7-3.12zM11 7v6h2V7h-2zm0 8v2h2v-2h-2z" />
                    </svg>
                </span> Alerta de productos
            </a>
            <a class="nav-item active" th:href="@{/inventario}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z" />
                    </svg>
                </span> Inventario
            </a>
            <a class="nav-item" th:href="@{/productos}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M20 7h-1V5c0-1.1-.9-2-2-2H7C5.9 3 5 3.9 5 5v2H4c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM7 5h10v2H7V5zm13 13H4V9h16v9zm-8-7c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3zm0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z" />
                    </svg>
                </span> Productos
            </a>
            <a class="nav-item" th:href="@{/configuracion}">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                    </svg>
                </span> Configuración
            </a>
        </div>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="window.location.href='/cerrarSesion'">
                <i class="bi bi-box-arrow-left"></i> Cerrar sesión
            </button>
        </div>
    </nav>

    <main class="col py-4 px-4 flex-grow-1 vh-100 overflow-auto bg-light">

        <div class="topbar">
            <h1>Alerta de productos próximos a vencer</h1>
            <div class="topbar-right">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="globalSearch" placeholder="Buscar..." oninput="applyFilters()">
                </div>
                <div class="user-chip">

                    <img src="https://i.pravatar.cc/40?img=12" alt="User">

                    <div class="user-chip-text">

                        <div th:text="${usuario != null ? usuario.nombre : 'Invitado'}"></div>

                        <div th:text="${usuario != null ? usuario.username : 'Sin sesión'}"></div>

                    </div>

                </div>
            </div>
        </div>

        <div class="inventory-container">
            <div class="row mb-4 g-3">

                <div class="col-md-4">
                    <div class="card card-red p-3 shadow-sm border-0">
                        <h3 th:text="${vencidos}">0</h3>
                        <p class="mb-0">Vencidos</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card card-orange p-3 shadow-sm border-0">
                        <h3 th:text="${porVencer}">0</h3>
                        <p class="mb-0">Por vencer</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card card-green p-3 shadow-sm border-0">
                        <h3 th:text="${vigentes}">0</h3>
                        <p class="mb-0">En buen estado</p>
                    </div>
                </div>

            </div>
            <div class="card p-3 mb-4 shadow-sm border-0">
                <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto...">
                    </div>

                    <div class="col-md-4">
                        <select id="filtroCategoria" class="form-select">
                            <option value="">Todas las categorías</option>

                            <option th:each="categoria : ${categorias}" th:value="${categoria.nombre}"
                                th:text="${categoria.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-primary w-100" onclick="filtrarTabla()">
                            Buscar
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-responsive shadow-sm rounded bg-white">
                <table id="tablaProductos" class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Lote</th>
                            <th>Fecha venc.</th>
                            <th>Días</th>
                            <th>Estado</th>
                            <th>Cantidad</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="producto : ${productos}" th:data-categoria="${producto.categoria.nombre}">

                            <td th:text="${producto.nombre}"></td>

                            <td th:text="${producto.lote}"></td>

                            <td th:text="${producto.fechaVencimiento}"></td>

                            <td>
                                <span th:if="${producto.fechaVencimiento.isBefore(T(java.time.LocalDate).now())}"
                                    class="text-danger fw-bold">
                                    Vencido
                                </span>

                                <span
                                    th:if="${producto.fechaVencimiento.isAfter(T(java.time.LocalDate).now().plusDays(30))}"
                                    class="text-success fw-bold">
                                    Vigente
                                </span>

                                <span th:if="${!producto.fechaVencimiento.isBefore(T(java.time.LocalDate).now()) 
                  and !producto.fechaVencimiento.isAfter(T(java.time.LocalDate).now().plusDays(30))}"
                                    class="text-warning fw-bold">
                                    Por vencer
                                </span>
                            </td>

                            <td>
                                <span th:if="${producto.fechaVencimiento.isBefore(T(java.time.LocalDate).now())}"
                                    class="badge bg-danger">
                                    Vencido
                                </span>

                                <span
                                    th:if="${producto.fechaVencimiento.isAfter(T(java.time.LocalDate).now().plusDays(30))}"
                                    class="badge bg-success">
                                    Vigente
                                </span>

                                <span th:if="${!producto.fechaVencimiento.isBefore(T(java.time.LocalDate).now()) 
                  and !producto.fechaVencimiento.isAfter(T(java.time.LocalDate).now().plusDays(30))}"
                                    class="badge bg-warning text-dark">
                                    Por vencer
                                </span>
                            </td>

                            <td th:text="${producto.stock}"></td>

                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
    <script src="/js/jsAlertaProducto.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
