<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/cssLogin.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUa6w6t6rJ5yY8p1Zl1eFsp+9oU2f1w8Vl5qZ6J9X5+I7j5gS37Bf1xxK2jG" crossorigin="anonymous">
</head>

<body>

  <div class="login-container">
    <h2>Iniciar sesión</h2>

    <div class="input-group">
      <label>Correo electrónico</label>
      <input type="email" placeholder="ejemplo@email.com">
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" placeholder="********">
    </div>
    <button class="btn" onclick="window.location.href='/index'">Ingresar</button>

    <div class="extra">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

</body>

</html>
