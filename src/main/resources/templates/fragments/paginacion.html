<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paginación Global</title>
    <style>
        .pagination-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 0;
        }
        .pag-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .btn-pag {
            background: #fff;
            border: 1px solid #dee2e6;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            min-width: 34px;
            text-align: center;
        }
        .btn-pag:hover:not(:disabled) {
            background: #f0f0f0;
        }
        .btn-pag.active {
            background: var(--gold, #C8972A);
            color: white;
            border-color: var(--gold, #C8972A);
        }
        .btn-pag:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-pag.disabled {
            opacity: 0.5;
            cursor: default;
        }
        @media (max-width: 576px) {
            .pagination-bar {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .pag-btns {
                justify-content: center;
            }
            .btn-pag {
                padding: 4px 10px;
                font-size: 0.8rem;
                min-width: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Fragmento de paginación reutilizable -->
    <div th:fragment="paginacion" class="pagination-container">
        <div class="pagination-bar">
            <span id="pagInfo" class="text-muted small">Mostrando 0 de 0 registros</span>
            <div class="pag-btns" id="pagBtns">
                <!-- Los botones se generarán con JavaScript -->
            </div>
        </div>
    </div>
</body>
</html>
