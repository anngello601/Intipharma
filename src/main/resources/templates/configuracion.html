<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Configuración</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/navbar-sidebar.css}">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@700&display=swap"
        rel="stylesheet">
</head>

<body class="d-flex vh-100 overflow-hidden">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="col py-4 px-4 flex-grow-1 vh-100 overflow-auto bg-light">
        <!-- TOPBAR -->
        <div class="topbar d-flex justify-content-between align-items-center mb-4">

            <h1>Configuración</h1>
            <!-- TOPBAR -->
            <div th:replace="~{fragments/topbar :: logo}"></div>
            <div th:replace="~{fragments/topbar :: scripts}"></div>

        </div>

        <div class="row">

            <!-- MENU CONFIG -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body">
                        <div class="config-menu">

                            <button class="config-item active-option w-100" onclick="mostrarSeccion('usuarios')">
                                <i class="bi bi-people"></i>
                                Gestión de Usuarios
                            </button>

                            <br><br>

                            <button class="config-item w-100" onclick="mostrarSeccion('alertas')">
                                <i class="bi bi-bell"></i>
                                Configuración de Alertas
                            </button>

                            <br><br>

                            <button class="config-item w-100" onclick="mostrarSeccion('correos')">
                                <i class="bi bi-envelope"></i>
                                Correos Automáticos
                            </button>

                            <br><br>

                            <button class="config-item w-100" onclick="mostrarSeccion('seguridad')">
                                <i class="bi bi-shield-lock"></i>
                                Seguridad
                            </button>

                            <br><br>

                            <button class="config-item w-100" onclick="mostrarSeccion('notificaciones')">
                                <i class="bi bi-app-indicator"></i>
                                Notificaciones
                            </button>

                            <br><br>

                            <button class="config-item w-100" onclick="mostrarSeccion('backup')">
                                <i class="bi bi-database"></i>
                                Copia de Seguridad
                            </button>

                        </div>
                    </div>
                </div>
            </div>

            <!-- CONTENIDO -->
            <div class="col-md-9">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body">

                        <!-- USUARIOS -->
                        <div class="config-box seccion" id="usuarios">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div>
                                    <h4>Gestión de Usuarios</h4>
                                    <p class="text-muted">Administra accesos del sistema.</p>
                                </div>
                                <div class="search-box position-relative mb-3">
                                    <i
                                        class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3"></i>
                                    <input type="text" id="inputBuscarNombre" class="form-control ps-5"
                                        placeholder="Buscar por nombre..." onkeyup="filtrarPorNombre()">
                                </div>
                                <button class="btn btn-warning text-white" onclick="probarConexion()">
                                    <i class="bi bi-person-plus"></i>
                                    Probar Conexión
                                </button>
                            </div>

                            <table id="tablaProductos" class="table table-hover align-middle" data-paginable
                                data-filas="5">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Correo</th>
                                        <th>Rol</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaUsuarios">
                                    <tr th:each="u : ${usuarios}">
                                        <td th:text="${u.nombre + ' ' + (u.apellido != null ? u.apellido : '')}">Nombre
                                        </td>
                                        <td th:text="${u.correo}">Correo</td>
                                        <td>
                                        <td>
                                            <span class="badge"
                                                th:classappend="${u.rol.nombreRol == 'ADMIN' ? 'bg-danger' : (u.rol.nombreRol == 'ASISTENTE' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                                th:text="${u.rol != null ? u.rol.nombreRol : 'Sin Rol'}">
                                            </span>
                                        </td>
                                        </td>
                                        <td><span class="text-success fw-bold">Activo</span></td>
                                        <td>
                                            <button type="button" class="btn btn-sm btn-primary" data-bs-toggle="modal"
                                                data-bs-target="#editarUsuarioModal" th:attr="data-id=${u.idUsuario}, 
                 data-dni=${u.dni}, 
                 data-nombre=${u.nombre}, 
                 data-apellido=${u.apellido}, 
                 data-correo=${u.correo},
                 data-rol=${u.rol.idRol}" onclick="llenarModal(this)">
                                                <i class="bi bi-pencil"></i>
                                            </button>

                                            <form th:action="@{/configuracion/eliminar/{id}(id=${u.idUsuario})}"
                                                method="post" style="display:inline;">
                                                <button type="submit" class="btn btn-sm btn-danger">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div th:replace="~{fragments/paginacion :: paginacion}"></div>
                        </div>

                        <!-- ALERTAS -->
                        <div class="config-box seccion d-none" id="alertas">
                            <h4>Configuración de Alertas</h4>
                            <br>
                            <label>Días previos para alertar vencimiento:</label>
                            <input type="number" class="form-control mb-3" value="15">
                            <label>Prioridad de alertas:</label>
                            <select class="form-select">
                                <option>Alta</option>
                                <option>Media</option>
                                <option>Baja</option>
                            </select>
                        </div>

                        <!-- CORREOS -->
                        <div class="config-box seccion d-none" id="correos">
                            <h4>Correos Automáticos</h4>
                            <br>
                            <label>Correo principal:</label>
                            <input type="email" class="form-control mb-3" placeholder="correo@empresa.com">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" checked>
                                <label class="form-check-label">Enviar alertas automáticas</label>
                            </div>
                        </div>

                        <!-- SEGURIDAD -->
                        <div class="config-box seccion d-none" id="seguridad">
                            <h4>Seguridad</h4>
                            <br>
                            <label>Cambiar contraseña:</label>
                            <input type="password" class="form-control mb-3" placeholder="Nueva contraseña">
                            <button class="btn btn-primary">Actualizar contraseña</button>
                        </div>

                        <!-- NOTIFICACIONES -->
                        <div class="config-box seccion d-none" id="notificaciones">
                            <h4>Notificaciones</h4>
                            <br>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" checked>
                                <label class="form-check-label">Notificaciones del sistema</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Sonidos de alerta</label>
                            </div>
                        </div>

                        <!-- BACKUP -->
                        <div class="config-box seccion d-none" id="backup">
                            <h4>Copia de Seguridad</h4>
                            <br>
                            <p>Última copia: 20/05/2026</p>
                            <button class="btn btn-success">Generar respaldo</button>
                        </div>

                    </div>
                </div>
            </div>

        </div> <!-- Cierre del row -->

    </main> <!-- ← Cierre del main (CORREGIDO) -->

    <div class="modal fade" id="editarUsuarioModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/configuracion/editar}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Editar Usuario</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" name="idUsuario" id="editId">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>DNI:</label>
                                <input type="text" name="dni" id="editDni" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Nombre:</label>
                                <input type="text" name="nombre" id="editNombre" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Apellido:</label>
                                <input type="text" name="apellido" id="editApellido" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Correo:</label>
                                <input type="email" name="correo" id="editCorreo" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Rol:</label>
                                <select name="rol.idRol" id="editRol" class="form-select" required>
                                    <option th:each="r : ${roles}" th:value="${r.idRol}" th:text="${r.nombreRol}">
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Nueva Contraseña (dejar vacío para no cambiar):</label>
                                <input type="password" name="password" id="editPassword" class="form-control"
                                    placeholder="Escriba solo si desea cambiarla">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/jsConfiguracion.js}"></script>
    <script th:src="@{/js/paginacionGlobal.js}"></script>

</body>

</html>
