<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Cerrar sesión - IntiPharma S.A.C.</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/navbar-sidebar.css}">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #C8972A;
      --gold-dark: #A87820;
      --gold-light: #E8B84B;
      --sidebar-bg: #C8972A;
      --text-dark: #1a1a2e;
      --text-mid: #4a4a6a;
      --text-light: #8888aa;
      --bg: #f4f6fb;
      --border: #e2e8f0;
      --blue: #2b3fa6;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px;
      min-width: 210px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      z-index: 10;
    }

    .sidebar-logo {
      font-family: 'Sora', sans-serif;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 700;
      padding: 28px 20px 24px;
      line-height: 1.3;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    }

    .sidebar-nav {
      flex: 1;
      padding: 18px 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 500;
      transition: background 0.18s, color 0.18s;
      cursor: pointer;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    .nav-item .nav-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
      display: block;
    }

    .sidebar-divider {
      border-top: 1px solid rgba(255, 255, 255, 0.25);
      margin: 10px 16px;
    }

    .nav-item-logout {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.12);
    }

    .nav-item-logout svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: #fff;
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
    }

    .search-box input {
      border: none;
      background: none;
      outline: none;
      font-size: 0.88rem;
      color: var(--text-dark);
      width: 200px;
      font-family: inherit;
    }

    .search-box i {
      color: var(--text-light);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 0.85rem;
      color: var(--text-mid);
    }

    .topbar-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .topbar-meta i {
      color: var(--gold);
      font-size: 0.95rem;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0 5px 18px;
      border-left: 1px solid var(--border);
    }

    .user-chip img {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-chip-text {
      line-height: 1.2;
    }

    .user-chip-name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text-dark);
    }

    .user-chip-role {
      font-size: 0.76rem;
      color: var(--text-light);
    }

    .online-dot {
      width: 9px;
      height: 9px;
      background: #22c55e;
      border-radius: 50%;
      border: 2px solid #fff;
      margin-left: -10px;
      margin-top: 22px;
      position: relative;
      z-index: 1;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    /* ── CARD ── */
    .logout-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 52px;
      width: 430px;
      max-width: 92vw;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .logout-icon {
      font-size: 2.4rem;
      color: var(--gold);
      margin-bottom: 18px;
      line-height: 1;
    }

    .logout-card h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 14px;
    }

    .logout-card p {
      font-size: 0.92rem;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 30px;
      max-width: 300px;
    }

    .btn-confirm {
      width: 100%;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 14px 0;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 12px;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-confirm:hover {
      background: var(--gold-dark);
      transform: translateY(-1px);
    }

    .btn-cancel {
      width: 100%;
      background: #fff;
      color: var(--blue);
      border: 2px solid var(--border);
      border-radius: 9px;
      padding: 13px 0;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-cancel:hover {
      background: var(--bg);
      border-color: #c5cadb;
    }
  </style>
</head>

<body>
  <!-- SIDEBAR -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar d-flex justify-content-between align-items-center">
      <h1>Cerrar Sesion</h1>

      <!-- TOPBAR -->
      <div th:replace="~{fragments/topbar :: logo}"></div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="logout-card">
        <div class="logout-icon">
          <i class="bi bi-box-arrow-right"></i>
        </div>
        <h2>¿Desea cerrar sesión?</h2>
        <p>Asegúrese de haber guardado todos sus cambios antes de salir del sistema administrativo.</p>
        <button class="btn-confirm" onclick="window.location.href='/login'">
          Cerrar sesión
        </button>
        <button class="btn-cancel" onclick="history.back()">
          Cancelar
        </button>
      </div>
    </div>

  </div>
  <script th:src="@{/js/sidebar.js}"></script>
  <script>
    // Fecha y hora en tiempo real
    function updateDateTime() {
      const now = new Date();
      const opcFecha = { day: 'numeric', month: 'short', year: 'numeric' };
      document.getElementById('fechaHoy').textContent = now.toLocaleDateString('es-PE', opcFecha);
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      const hh12 = String(now.getHours() % 12 || 12).padStart(2, '0');
      document.getElementById('horaActual').textContent = `${hh12}:${mm} ${ampm}`;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);
  </script>

</body>

</html>
