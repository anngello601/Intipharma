<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/cssProductos.css}">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@700&display=swap"
        rel="stylesheet">
</head>

<body class="d-flex vh-100 overflow-hidden">

    <!-- SIDEBAR -->
    <nav class="col-auto col-md-2 col-xl-2 px-sm-2 px-0 bg-warning d-flex flex-column vh-100">

        <!-- LOGO -->
        <h2 class="mt-3 ps-3 text-white fw-bold">
            IntiPharma<br>S.A.C.
        </h2>

        <!-- MENÚ -->
        <div class="sidebar-nav mt-3">
            <a class="menu-item  mb-1 text-white text-decoration-none" th:href="@{/alertaProducto}">
                <h5 class="d-flex align-items-center text-nowrap">
                    <svg class="me-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                        <path fill="white"
                            d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.25C17.25 21.15 21 16.25 21 11V5L12 1zm0 2.18l7 3.12V11c0 4.1-2.93 7.93-7 9.07C7.93 18.93 5 15.1 5 11V6.3l7-3.12zM11 7v6h2V7h-2zm0 8v2h2v-2h-2z" />
                    </svg>
                    <span>Alerta de productos</span>
                </h5>
            </a>

            <a class="menu-item  mb-1 text-white text-decoration-none" th:href="@{/inventario}">
                <h5 class="d-flex align-items-center text-nowrap">
                    <svg class="me-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                        <path fill="white"
                            d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z" />
                    </svg>
                    <span>Inventario</span>
                </h5>
            </a>

            <a class="menu-item  mb-1 text-white text-decoration-none active" th:href="@{/productos}">
                <h5 class="d-flex align-items-center text-nowrap">
                    <svg class="me-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                        <path fill="white"
                            d="M20 7h-1V5c0-1.1-.9-2-2-2H7C5.9 3 5 3.9 5 5v2H4c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM7 5h10v2H7V5zm13 13H4V9h16v9zm-8-7c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3zm0 4c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z" />
                    </svg>
                    <span>Productos</span>
                </h5>
            </a>

            <a class="menu-item  mb-1 text-white text-decoration-none" th:href="@{/configuracion}">
                <h5 class="d-flex align-items-center text-nowrap">
                    <svg class="me-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
                        <path fill="white"
                            d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c-.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                    </svg>
                    <span>Configuración</span>
                </h5>
            </a>
        </div>

        <!-- BOTÓN CERRAR SESIÓN -->
        <button class="btn btn-light mt-auto mb-3 " onclick="window.location.href='/cerrarSesion'">
            <i class="bi bi-box-arrow-left"></i>
            <span>Cerrar sesión</span>
        </button>

    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="col py-4 px-4 flex-grow-1 vh-100 overflow-auto bg-light">

        <!-- TOPBAR -->
        <div class="topbar d-flex justify-content-between align-items-center mb-4">

            <h1>Gestión de Productos</h1>

            <div class="topbar-right d-flex align-items-center gap-3">

                <!-- BUSCADOR -->
                <div class="search-box position-relative">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3"></i>
                    <input type="text" id="globalSearch" class="form-control ps-5" placeholder="Buscar..."
                        oninput="applyFilters()">
                </div>

                <!-- USUARIO -->
                <div class="user-chip d-flex align-items-center bg-white p-2 rounded-pill shadow-sm border">

                    <div class="me-2 text-primary">
                        <img src="https://i.pravatar.cc/40?img=12" alt="logoAvatar" class="rounded-circle" width="40"
                            height="40">
                    </div>
                    <div class="user-chip-text d-flex flex-column">
                        <span class="fw-bold" style="line-height: 1.2;"
                            th:text="${session.nombre + ' ' + (session.apellido != null ? session.apellido : '')}">
                        </span>
                        <span class="small text-muted" style="line-height: 1.2;"
                            th:text="${session.rol == 0 ? 'Administrador' : (session.rol == 1 ? 'Asistente' : 'Usuario')}">
                        </span>
                    </div>
                </div>

            </div>

        </div>


        <div class="row">

        </div>



        <button class="btn btn-warning text-white">

            <i class="bi bi-plus-lg"></i>

            Nuevo Producto

        </button>

        </div>

        <!-- FILTROS -->
        <div class="card p-3 mb-4 shadow-sm border-0">

            <div class="row g-3">

                <div class="col-md-5">

                    <input type="text" class="form-control" placeholder="Buscar producto...">

                </div>

                <div class="col-md-4">

                    <select class="form-select">

                        <option>Todas las categorías</option>
                        <option>Medicamentos</option>
                        <option>Insumos</option>
                        <option>Vitaminas</option>

                    </select>

                </div>

                <div class="col-md-3">

                    <button class="btn btn-primary w-100">

                        Buscar

                    </button>

                </div>

            </div>

        </div>

        <!-- TABLA -->
        <div class="card shadow-sm border-0">

            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                            <tr>

                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Código</th>
                                <th>Categoría</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Acciones</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr>

                                <td>1</td>

                                <td>Paracetamol 500mg</td>

                                <td>PR-001</td>

                                <td>Medicamentos</td>

                                <td>120</td>

                                <td>
                                    <span class="badge bg-success">

                                        Disponible

                                    </span>
                                </td>

                                <td>

                                    <i class="bi bi-pencil-square action-icon"></i>

                                    <i class="bi bi-trash action-icon"></i>

                                </td>

                            </tr>

                            <tr>

                                <td>2</td>

                                <td>Ibuprofeno</td>

                                <td>PR-002</td>

                                <td>Medicamentos</td>

                                <td>45</td>

                                <td>
                                    <span class="badge bg-danger">

                                        Stock Bajo

                                    </span>
                                </td>

                                <td>

                                    <i class="bi bi-pencil-square action-icon"></i>

                                    <i class="bi bi-trash action-icon"></i>

                                </td>

                            </tr>

                            <tr>

                                <td>3</td>

                                <td>Vitamina C</td>

                                <td>PR-003</td>

                                <td>Vitaminas</td>

                                <td>80</td>

                                <td>
                                    <span class="badge bg-success">

                                        Disponible

                                    </span>
                                </td>

                                <td>

                                    <i class="bi bi-pencil-square action-icon"></i>

                                    <i class="bi bi-trash action-icon"></i>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </main>

    </div>

    </div>

</body>

<script>

    // ACTIVAR EDITAR Y ELIMINAR
    function activarBotones() {

        document.querySelectorAll(".bi-trash").forEach(btn => {

            btn.onclick = function () {

                if (confirm("¿Eliminar producto?")) {
                    this.closest("tr").remove();
                }

            };

        });

        document.querySelectorAll(".bi-pencil-square").forEach(btn => {

            btn.onclick = function () {

                let fila = this.closest("tr");

                let nombre = prompt("Nombre:", fila.cells[1].innerText);
                let codigo = prompt("Código:", fila.cells[2].innerText);
                let categoria = prompt("Categoría:", fila.cells[3].innerText);
                let stock = prompt("Stock:", fila.cells[4].innerText);

                if (nombre) fila.cells[1].innerText = nombre;
                if (codigo) fila.cells[2].innerText = codigo;
                if (categoria) fila.cells[3].innerText = categoria;
                if (stock) fila.cells[4].innerText = stock;

            };

        });

    }

    activarBotones();


    // NUEVO PRODUCTO
    document.querySelector(".btn-warning.text-white").addEventListener("click", function () {

        let nombre = prompt("Nombre del producto:");
        if (!nombre) return;

        let codigo = prompt("Código:");
        if (!codigo) return;

        let categoria = prompt("Categoría:");
        if (!categoria) return;

        let stock = prompt("Stock:");
        if (!stock) return;

        let tabla = document.querySelector("tbody");

        let fila = document.createElement("tr");

        fila.innerHTML = `
        <td>${tabla.rows.length + 1}</td>
        <td>${nombre}</td>
        <td>${codigo}</td>
        <td>${categoria}</td>
        <td>${stock}</td>
        <td>
            <span class="badge bg-success">
                Disponible
            </span>
        </td>
        <td>
            <i class="bi bi-pencil-square action-icon"></i>
            <i class="bi bi-trash action-icon"></i>
        </td>
    `;

        tabla.appendChild(fila);

        activarBotones();

    });


    // BUSCAR PRODUCTO
    document.querySelector(".btn-primary").addEventListener("click", function () {

        let texto = document.querySelector("input.form-control")
            .value
            .toLowerCase();

        document.querySelectorAll("tbody tr").forEach(fila => {

            let nombre = fila.cells[1].innerText.toLowerCase();

            if (nombre.includes(texto)) {
                fila.style.display = "";
            } else {
                fila.style.display = "none";
            }

        });

    });

</script>

</html>
