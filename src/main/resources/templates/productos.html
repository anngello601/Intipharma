<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - IntiPharma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbar-sidebar.css}">
</head>

<body class="d-flex vh-100 overflow-hidden">
<!-- SIDEBAR -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="col py-4 px-4 flex-grow-1 vh-100 overflow-auto bg-light">
        <div class="topbar d-flex justify-content-between align-items-center">
            <h1>Gestión de productos</h1>

            <div class="user-chip d-flex align-items-center bg-white p-2 rounded-pill shadow-sm border">

                <div class="me-2 text-primary">
                    <img src="https://i.pravatar.cc/40?img=12" alt="logoAvatar" class="rounded-circle" width="40"
                        height="40">
                </div>
                <div class="user-chip-text d-flex flex-column">
                    <span class="fw-bold" style="line-height: 1.2;"
                        th:text="${session.nombre + ' ' + (session.apellido != null ? session.apellido : '')}">
                    </span>
                    <span class="small text-muted" style="line-height: 1.2;"
                        th:text="${session.rol == 0 ? 'Administrador' : (session.rol == 1 ? 'Asistente' : 'Usuario')}">
                    </span>
                </div>
            </div>
        </div>

        <div class="card p-3 mb-4 shadow-sm border-0">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto...">
                </div>
                <div class="col-md-4">
                    <select id="filtroCategoria" class="form-select">
                        <option value="">Todas las categorías</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.nombreCategoria}"
                            th:text="${cat.nombreCategoria}"></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white p-3">
            <table id="tablaProductos" class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Código</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.idProducto}"></td>
                        <td th:text="${p.nombreProducto}"></td>
                        <td th:text="${p.codigoBarras}"></td>
                        <td th:text="${p.categoria != null ? p.categoria.nombreCategoria : 'N/A'}"></td>
                        <td th:text="${p.cantidad}"></td>

                        <td>
                            <span th:if="${p.cantidad > 10}" class="badge bg-success">Disponible</span>
                            <span th:if="${p.cantidad <= 10}" class="badge bg-danger">Stock Bajo</span>
                        </td>

                        <td>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                                data-bs-target="#modalEditar" th:data-id="${p.idProducto}"
                                th:data-nombre="${p.nombreProducto}" th:data-codigo="${p.codigoBarras}"
                                th:data-descripcion="${p.descripcion}"
                                th:data-categoria="${p.categoria != null ? p.categoria.idCategoria : ''}"
                                th:data-ubicacion="${p.idUbicacion}" th:data-lote="${p.lote}"
                                th:data-laboratorio="${p.laboratorio}" th:data-registro="${p.registroSanitario}"
                                th:data-precio="${p.precio}" th:data-cantidad="${p.cantidad}"
                                th:data-unidad="${p.unidadMedida}" th:data-vencimiento="${p.fechaVencimiento}"
                                th:data-estado="${p.estado}" onclick="llenarModalEditar(this)">
                                <i class="bi bi-pencil-square"></i>
                            </button>

                            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal"
                                data-bs-target="#modalEliminar"
                                th:data-url="@{/eliminarProducto/{id}(id=${p.idProducto})}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <form th:action="@{/guardarProducto}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Gestión de Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="idProducto" id="editId">

                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label>Nombre:</label>
                            <input type="text" name="nombreProducto" id="editNombre" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Código Barras:</label>
                            <input type="text" name="codigoBarras" id="editCodigo" class="form-control">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label>Descripción:</label>
                        <input type="text" name="descripcion" id="editDescripcion" class="form-control">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label>Categoría:</label>
                            <select name="categoria.idCategoria" id="editCategoria" class="form-select">
                                <option value="">Seleccione...</option>
                                <option th:each="c : ${categorias}" th:value="${c.idCategoria}"
                                    th:text="${c.nombreCategoria}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Ubicación (Pasillo):</label>
                            <select name="idUbicacion" id="editUbicacion" class="form-select">
                                <option value="">Seleccione una ubicación</option>
                                <option th:each="u : ${listaUbicaciones}" th:value="${u.idUbicacion}"
                                    th:text="${u.pasillo}">Pasillo</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <label>Lote:</label>
                            <input type="text" name="lote" id="editLote" class="form-control">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label>Laboratorio:</label>
                            <input type="text" name="laboratorio" id="editLaboratorio" class="form-control">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label>Reg. Sanitario:</label>
                            <input type="text" name="registroSanitario" id="editRegistro" class="form-control">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <label>Precio:</label>
                            <input type="number" step="0.01" name="precio" id="editPrecio" class="form-control">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label>Cantidad:</label>
                            <input type="number" name="cantidad" id="editCantidad" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Unidad de Medida:</label>
                            <select name="unidadMedida" id="editUnidad" class="form-select">
                                <option value="Caja">Caja</option>
                                <option value="Frasco">Frasco</option>
                                <option value="Tubo">Tubo</option>
                                <option value="Ampolla">Ampolla</option>
                                <option value="Tableta">Tableta</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label>Vencimiento:</label>
                            <input type="date" name="fechaVencimiento" id="editVencimiento" class="form-control">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Estado:</label>
                            <select name="estado" id="editEstado" class="form-select">
                                <option value="Activo">Activo</option>
                                <option value="Bajo stock">Bajo stock</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar</h5>
                </div>
                <div class="modal-body">¿Estás seguro de eliminar este producto?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <a id="btnConfirmarEliminar" href="#" class="btn btn-danger">Eliminar</a>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/jsProductos.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
