<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - IntiPharma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cssProductos.css}">
    <style>
        .sidebar {
            width: 250px;
            background: #b8860b;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            color: white;
            text-decoration: none;
            padding: 15px;
            display: block;
        }

        .nav-item:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .btn-logout {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 10px;
            width: 90%;
            margin: 10px;
        }
    </style>
</head>

<body class="d-flex vh-100 overflow-hidden">

    <nav class="sidebar">
        <div class="sidebar-logo">IntiPharma<br>S.A.C.</div>
        <div class="sidebar-nav">
            <a class="nav-item" th:href="@{/alertaProducto}">
                <span class="nav-icon"><i class="bi bi-shield-exclamation"></i></span> Alerta de productos
            </a>
            <div th:if="${session.rol == 0 || session.rol == 1}">
                <a class="nav-item" th:href="@{/inventario}">
                    <span class="nav-icon"><i class="bi bi-box-seam"></i></span> Inventario
                </a>
                <a class="nav-item" th:href="@{/productos}">
                    <span class="nav-icon"><i class="bi bi-capsule"></i></span> Productos
                </a>
            </div>
            <a th:if="${session.rol == 0}" class="nav-item" th:href="@{/configuracion}">
                <span class="nav-icon"><i class="bi bi-gear"></i></span> Configuración
            </a>
        </div>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="window.location.href='/cerrarSesion'">
                <i class="bi bi-box-arrow-left"></i> Cerrar sesión
            </button>
        </div>
    </nav>

    <main class="col py-4 px-4 flex-grow-1 vh-100 overflow-auto bg-light">
        <div class="topbar d-flex justify-content-between align-items-center">
            <h1>Gestión de productos</h1>

            <div class="user-chip d-flex align-items-center bg-white p-2 rounded-pill shadow-sm border">

                <div class="me-2 text-primary">
                    <img src="https://i.pravatar.cc/40?img=12" alt="logoAvatar" class="rounded-circle" width="40"
                        height="40">
                </div>
                <div class="user-chip-text d-flex flex-column">
                    <span class="fw-bold" style="line-height: 1.2;"
                        th:text="${session.nombre + ' ' + (session.apellido != null ? session.apellido : '')}">
                    </span>
                    <span class="small text-muted" style="line-height: 1.2;"
                        th:text="${session.rol == 0 ? 'Administrador' : (session.rol == 1 ? 'Asistente' : 'Usuario')}">
                    </span>
                </div>
            </div>
        </div>

        <div class="card p-3 mb-4 shadow-sm border-0">
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto...">
                </div>
                <div class="col-md-4">
                    <select id="filtroCategoria" class="form-select">
                        <option value="">Todas las categorías</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.nombreCategoria}"
                            th:text="${cat.nombreCategoria}"></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white p-3">
            <table id="tablaProductos" class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Código</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.idProducto}"></td>
                        <td th:text="${p.nombreProducto}"></td>
                        <td th:text="${p.codigoBarras}"></td>
                        <td th:text="${p.categoria != null ? p.categoria.nombreCategoria : 'N/A'}"></td>
                        <td th:text="${p.cantidad}"></td>

                        <td>
                            <span th:if="${p.cantidad > 10}" class="badge bg-success">Disponible</span>
                            <span th:if="${p.cantidad <= 10}" class="badge bg-danger">Stock Bajo</span>
                        </td>

                        <td>
                            <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                                data-bs-target="#modalEditar" th:data-id="${p.idProducto}"
                                th:data-nombre="${p.nombreProducto}" th:data-stock="${p.cantidad}"
                                th:data-codigo="${p.codigoBarras}" th:data-lote="${p.lote}"
                                th:data-id-cat="${p.categoria != null ? p.categoria.idCategoria : ''}">
                                <i class="bi bi-pencil-square"></i>
                            </button>

                            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-toggle="modal"
                                data-bs-target="#modalEliminar"
                                th:data-url="@{/eliminarProducto/{id}(id=${p.idProducto})}">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/guardarProducto}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Producto</h5>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="idProducto" id="editId">
                    <input type="hidden" name="lote" id="editLote">
                    <input type="hidden" name="laboratorio" id="editLaboratorio">
                    <input type="hidden" name="registroSanitario" id="editRegistro">
                    <input type="hidden" name="fechaIngreso" id="editFechaIngreso">
                    <input type="hidden" name="estado" id="editEstado">
                    <input type="hidden" name="idUbicacion" id="editIdUbicacion">
                    <input type="hidden" name="idUsuario" id="editIdUsuario">

                    <div class="mb-2">
                        <label>Nombre:</label>
                        <input type="text" name="nombreProducto" id="editNombre" class="form-control" required>
                    </div>
                    <div class="mb-2">
                        <label>Código de Barras:</label>
                        <input type="text" name="codigoBarras" id="editCodigo" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label>Categoría:</label>
                        <select name="categoria.idCategoria" id="editCategoria" class="form-select">
                            <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}"
                                th:text="${cat.nombreCategoria}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Stock:</label>
                        <input type="number" name="cantidad" id="editStock" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label>Fecha Vencimiento:</label>
                        <input type="date" name="fechaVencimiento" id="editFechaVenc" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar</h5>
                </div>
                <div class="modal-body">¿Estás seguro de eliminar este producto?</div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <a id="btnConfirmarEliminar" href="#" class="btn btn-danger">Eliminar</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Lógica de búsqueda y filtrado
        document.getElementById('buscarProducto').addEventListener('keyup', filtrarTabla);
        document.getElementById('filtroCategoria').addEventListener('change', filtrarTabla);

        function filtrarTabla() {
            const texto = document.getElementById('buscarProducto').value.toLowerCase();
            const catFiltro = document.getElementById('filtroCategoria').value;
            const filas = document.querySelectorAll('#tablaProductos tbody tr');

            filas.forEach(fila => {
                const nombre = fila.cells[1].innerText.toLowerCase();
                const cat = fila.cells[3].innerText;
                const coincideTexto = nombre.includes(texto);
                const coincideCat = (catFiltro === "" || cat === catFiltro);
                fila.style.display = (coincideTexto && coincideCat) ? "" : "none";
            });
        }
        // Lógica para el botón eliminar
        document.getElementById('modalEliminar').addEventListener('show.bs.modal', e =>
            document.getElementById('btnConfirmarEliminar').href = e.relatedTarget.getAttribute('data-url'));
        // Lógica para el botón editar    
        // Lógica para el botón editar (Bootstrap 5)
        const modalEditar = document.getElementById('modalEditar');
        modalEditar.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget; // El botón que disparó el modal

            // Extraer datos del botón
            const id = button.getAttribute('data-id');
            const nombre = button.getAttribute('data-nombre');
            const stock = button.getAttribute('data-stock');
            const codigo = button.getAttribute('data-codigo');
            const lote = button.getAttribute('data-lote');
            const cat = button.getAttribute('data-id-cat');

            // Asignar a los campos del formulario
            document.getElementById('editId').value = id;
            document.getElementById('editNombre').value = nombre;
            document.getElementById('editStock').value = stock;
            document.getElementById('editCodigo').value = codigo;
            document.getElementById('editLote').value = lote;
            document.getElementById('editCategoria').value = cat;
        });

    </script>
</body>

</html>
